services:
  - type: web
    name: weibo-diary
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_PATH
        value: /var/data/diary_app.db
    disks:
      - name: weibo-diary-data
        mountPath: /var/data
        sizeGB: 1
